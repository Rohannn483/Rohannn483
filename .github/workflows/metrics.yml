name: GitHub Metrics

on:
  schedule:
    - cron: "0 */6 * * *"   # har 6 ghante mein update hoga
  workflow_dispatch:         # manually bhi chala sakte ho
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📊 Language stats + habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Rohannn483
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 6
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          config_timezone: Asia/Kolkata
          filename: metrics.plugin.languages.svg
          config_output: svg

      - name: 📅 Isometric calendar (normal)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Rohannn483
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_timezone: Asia/Kolkata
          filename: metrics.plugin.isocalendar.svg
          config_output: svg

      - name: 📅 Isometric calendar (full year)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Rohannn483
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Kolkata
          filename: metrics.plugin.isocalendar.full.svg
          config_output: svg

      - name: ⚡ Coding habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Rohannn483
          template: classic
          base: ""
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: chartist
          plugin_habits_days: 30
          plugin_habits_facts: yes
          config_timezone: Asia/Kolkata
          filename: metrics.plugin.habits.svg
          config_output: svg
